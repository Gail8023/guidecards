<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1.5">
<title>Gail的引路卡包</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f3ee;--bg-warm:#eee9e0;--bg-card:#ffffff;
  --text:#2c2418;--text-secondary:#6b5e50;--text-tertiary:#9a8e80;
  --accent:#8b5e3c;--accent-light:#c49a6c;--accent-pale:rgba(139,94,60,0.08);
  --border:#e4ddd3;--border-light:#eeebe5;
  --serif:'Noto Serif SC',Georgia,'Times New Roman',serif;
  --sans:-apple-system,'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
  --radius:6px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:0;-webkit-font-smoothing:antialiased;text-wrap:pretty}
::selection{background:var(--accent-pale);color:var(--accent)}

.container{max-width:540px;margin:0 auto;padding:0 16px 80px;position:relative}

/* Tab navigation — clean, no emoji */
.tab-bar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{flex:0 0 auto;padding:14px 18px;font-size:13px;font-weight:600;color:var(--text-tertiary);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .25s;font-family:var(--sans);letter-spacing:.3px}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text-secondary)}
.tab-page{display:none}.tab-page.active{display:block}

/* Cover — serif, understated */
.cover{text-align:center;padding:48px 24px 36px}
.cover h1{font-family:var(--serif);font-size:26px;font-weight:900;color:var(--text);letter-spacing:3px;line-height:1.4}
.cover .sub{font-size:13px;color:var(--text-secondary);margin-top:8px;letter-spacing:1.5px;font-weight:400}
.cover .motto{font-size:12px;color:var(--text-tertiary);margin-top:12px;font-family:var(--serif);font-style:italic;letter-spacing:.5px}

/* Progress — minimal */
.progress-wrap{display:flex;align-items:center;gap:12px;padding:0 2px;margin-bottom:16px}
.progress-track{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.progress-text{font-size:11px;color:var(--text-tertiary);white-space:nowrap;font-variant-numeric:tabular-nums}

/* Toolbar — text links, not buttons */
.toolbar{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tool-btn{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;font-size:12px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:all .2s;font-family:var(--sans)}
.tool-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Chapter/Group */
.chapter{margin-bottom:4px;margin-top:24px}.chapter:first-of-type{margin-top:0}
.chapter-header{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;border-bottom:1px solid var(--border-light);transition:all .2s;user-select:none}
.chapter-header:hover{border-bottom-color:var(--accent-light)}
.chapter-name{font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);flex:1;line-height:1.5}
.chapter-count{font-size:11px;color:var(--text-tertiary);font-variant-numeric:tabular-nums}
.chapter-arrow{font-size:10px;color:var(--text-tertiary);transition:transform .25s;display:inline-block}
.chapter.open .chapter-arrow{transform:rotate(90deg)}
.chapter-body{display:none;padding:8px 0 0}.chapter.open .chapter-body{display:block}

/* Card — clean, no left-border-accent */
.card{margin-bottom:2px;background:var(--bg-card);overflow:hidden;transition:all .2s;border-bottom:1px solid var(--border-light)}
.card:last-child{border-bottom:none}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 4px;cursor:pointer}
.card-num{font-family:var(--serif);font-size:12px;font-weight:700;color:var(--accent);min-width:24px;text-align:center;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--text);line-height:1.4}
.card-name small{font-family:var(--sans);font-weight:400;color:var(--text-tertiary);font-size:11px;margin-left:4px}
.card-def{font-size:12px;color:var(--text-tertiary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s}
.status-dot.learned{background:var(--accent)}

/* Card detail */
.card-detail{display:none;padding:4px 4px 20px 34px}.card.open .card-detail{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.detail-section{margin-top:16px}
.detail-label{font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.detail-text{font-size:13px;line-height:1.8;color:var(--text)}
.detail-quote{font-family:var(--serif);font-size:13px;line-height:1.8;color:var(--accent);font-style:italic;padding:12px 16px;background:var(--accent-pale);border-radius:var(--radius);margin-top:8px}
.practice-box{margin-top:12px;padding:12px 16px;background:#f9f7f3;border-radius:var(--radius)}
.practice-q{font-size:13px;color:var(--text);line-height:1.7}
.action-box{margin-top:12px;padding:12px 16px;background:#f4f8f5;border-radius:var(--radius)}
.action-text{font-size:13px;color:#2a5a38;line-height:1.7}
.boundary-box{margin-top:8px;padding:10px 16px;background:#faf9f5;border-radius:var(--radius)}
.boundary-text{font-size:12px;color:var(--text-tertiary);line-height:1.7}

/* Note area */
.note-area{margin-top:16px;padding-top:16px;border-top:1px solid var(--border-light)}
.note-title{font-size:11px;font-weight:600;color:var(--text-tertiary);letter-spacing:.5px;margin-bottom:8px}
.note-textarea{width:100%;min-height:48px;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;font-size:12px;font-family:var(--sans);resize:vertical;background:var(--bg);color:var(--text);line-height:1.6}
.note-textarea:focus{outline:none;border-color:var(--accent)}
.tag-select{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap}
.tag-opt{padding:3px 8px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;font-size:10px;cursor:pointer;transition:all .15s;font-family:var(--sans);color:var(--text-secondary)}
.tag-opt:hover,.tag-opt.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.save-note-btn{margin-top:8px;padding:5px 16px;border-radius:var(--radius);border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s}
.save-note-btn:hover{background:var(--accent);color:#fff}
.note-saved{display:none;padding:8px 12px;background:var(--accent-pale);border-radius:var(--radius);font-size:12px;color:var(--text);line-height:1.6;margin-top:6px}
.note-saved.show{display:block}
.note-date{font-size:9px;color:var(--text-tertiary);margin-top:3px}

/* Module tool (three-force) — same clean aesthetic */
.module-tool{margin-bottom:2px;background:var(--bg-card);border-bottom:1px solid var(--border-light);overflow:hidden}
.module-tool:last-child{border-bottom:none}
.module-tool-header{display:flex;align-items:center;gap:10px;padding:14px 4px;cursor:pointer}
.module-tool-header .mt-name{flex:1;font-family:var(--serif);font-size:14px;font-weight:700;color:var(--text)}
.module-tool-header .mt-num{font-family:var(--serif);font-size:12px;font-weight:700;color:var(--accent);min-width:24px;text-align:center}
.module-tool-header .mt-arrow{font-size:10px;color:var(--text-tertiary);transition:transform .25s}
.module-tool.open .mt-arrow{transform:rotate(90deg)}
.module-tool-body{display:none;padding:4px 4px 20px 34px}
.module-tool.open .module-tool-body{display:block;animation:fadeIn .3s}
.mt-desc{font-size:13px;line-height:1.8;color:var(--text)}

/* Modal — clean overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,24,0.4);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-card{background:var(--bg-card);border-radius:12px;padding:28px 22px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.15);animation:modalIn .3s ease}
@keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-card .close-btn{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-tertiary);padding:0 4px;font-family:var(--sans)}
.modal-card .close-btn:hover{color:var(--text)}
.modal-card h3{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:12px;font-weight:700}

/* Footer */
.page-footer{text-align:center;margin-top:32px;padding:16px;font-size:10px;color:var(--text-tertiary);letter-spacing:1.5px;font-family:var(--serif)}
</style>
</head>
<body>
